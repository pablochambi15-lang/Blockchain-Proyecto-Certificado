<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Emitir Certificado</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/emitir.css}">

</head>

<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}">
</div>

<!-- Contenido -->
<div class="contenido">

    <div class="container">

        <div class="card formulario">

            <h2 class="titulo">

                Emitir Certificado

            </h2>

            <form th:action="@{/emitir}"
      th:object="${certificateRequest}"
      method="post">

    <div class="mb-3">

        <label class="form-label">
            ID del certificado
        </label>

        <input
                th:field="*{certificateId}"
                class="form-control">

        <div class="text-danger"
             th:if="${#fields.hasErrors('certificateId')}"
             th:errors="*{certificateId}">
        </div>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Nombre del alumno
        </label>

        <input
                th:field="*{studentName}"
                class="form-control">

        <div class="text-danger"
             th:if="${#fields.hasErrors('studentName')}"
             th:errors="*{studentName}">
        </div>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Curso
        </label>

        <input
                th:field="*{courseName}"
                class="form-control">

        <div class="text-danger"
             th:if="${#fields.hasErrors('courseName')}"
             th:errors="*{courseName}">
        </div>

    </div>

    <div class="mb-4">

        <label class="form-label">
            Institución
        </label>

        <input
                th:field="*{institutionName}"
                class="form-control">

        <div class="text-danger"
             th:if="${#fields.hasErrors('institutionName')}"
             th:errors="*{institutionName}">
        </div>

    </div>

    <button
            type="submit"
            class="btn btn-primary w-100">

        Emitir Certificado

    </button>

</form>

        </div>

    </div>

</div>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
