<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Certificado Verificado</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/resultadoVerificacion.css}">

</head>

<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}">
</div>

<!-- Contenido -->
<div class="contenido">

    <div class="container">

        <div class="card resultado">

            <div class="icono">

                ✅

            </div>

            <h1>

                Certificado Verificado

            </h1>

            <hr>

            <div class="campo">

                <h5>Alumno</h5>

                <p th:text="${certificado.studentName}">
                </p>

            </div>

            <div class="campo">

                <h5>Curso</h5>

                <p th:text="${certificado.courseName}">
                </p>

            </div>

            <div class="campo">

                <h5>Institución</h5>

                <p th:text="${certificado.institutionName}">
                </p>

            </div>

            <div class="campo">

                <h5>Hash SHA-256</h5>

                <div class="hash">

                    <p th:text="${certificado.certificateHash}">
                    </p>

                </div>

            </div>

            <div class="estado">

                ✓ Certificado válido

            </div>

            <div class="mt-4">

                <a href="/verificar"
                   class="btn btn-success">

                    Verificar otro

                </a>

                <a href="/"
                   class="btn btn-primary">

                    Volver al inicio

                </a>

            </div>

        </div>

    </div>

</div>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>

</html>
