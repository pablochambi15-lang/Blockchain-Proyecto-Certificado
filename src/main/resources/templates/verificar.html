<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Verificar Certificado</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/verificar.css}">

</head>

<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}">
</div>

<!-- Contenido -->
<div class="contenido">

    <div class="container">

        <div class="card formulario">

            <h2 class="titulo">

                Verificar Certificado

            </h2>

            <form th:action="@{/verificar}"
                  method="post">

                <div class="mb-4">

                    <label class="form-label">

                        ID del certificado

                    </label>

                    <input
                            type="text"
                            name="certificateId"
                            class="form-control"
                            placeholder="Ingrese el ID del certificado"
                            required>

                </div>

                <button
                        type="submit"
                        class="btn btn-success w-100">

                    Verificar

                </button>

            </form>

        </div>

    </div>

</div>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>

</html>
