<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Certificado Emitido</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/resultado.css}">

</head>

<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}">
</div>

<!-- Contenido -->
<div class="contenido">

    <div class="container">

        <div class="card resultado">

            <div class="icono">

                ✅

            </div>

            <h1>

                Certificado emitido correctamente

            </h1>

            <hr>

            <h5>

                Transaction Hash

            </h5>

            <div class="hash">

                <p th:text="${txHash}">
                </p>

            </div>

            <div class="mt-4">

                <a href="/"
                   class="btn btn-primary">

                    Volver al inicio

                </a>

                <a href="/emitir"
                   class="btn btn-success">

                    Emitir otro certificado

                </a>

            </div>

        </div>

    </div>

</div>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>

</html>
